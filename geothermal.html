<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geothermal | Ground Engineering Toolbox</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Geothermal Module</h1>
      <p class="subtitle">Prototype calculator</p>
    </div>
  </header>

  <main class="container">
    <nav class="top-nav">
      <a href="index.html">← Back to Home</a>
    </nav>

    <section class="card">
      <h2>Simple Product Calculator</h2>
      <p>Enter x and y, then calculate x × y.</p>

      <div class="form-group">
        <label for="x">x</label>
        <input type="number" id="x" step="any" placeholder="Enter x" />
      </div>

      <div class="form-group">
        <label for="y">y</label>
        <input type="number" id="y" step="any" placeholder="Enter y" />
      </div>

      <div class="button-row">
        <button class="button" onclick="calculateProduct()">Calculate</button>
      </div>

      <div class="result-box">
        <strong>Result:</strong>
        <span id="result">-</span>
      </div>
    </section>
  </main>

  <script>
    function calculateProduct() {
      const x = parseFloat(document.getElementById("x").value);
      const y = parseFloat(document.getElementById("y").value);
      const resultEl = document.getElementById("result");

      if (isNaN(x) || isNaN(y)) {
        resultEl.textContent = "Please enter valid numbers.";
        return;
      }

      resultEl.textContent = x * y;
    }
  </script>
</body>
</html>
